# AI tools declaration  (transparency only — honest)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude (Anthropic) was used as a pair-programmer for architecture discussion, code review,
  and iterating on the evaluation methodology. All design decisions were validated by our own
  offline eval harness (planted cases, proxy NDCG/MAP, a hand-labeled gold set), not accepted
  on the model's say-so. No candidate data was sent to any hosted LLM, and NO LLM is called
  during ranking — the ranking step is offline, CPU-only, and dependency-free by construction.

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  EvidenceRank is a deterministic, stdlib-only ranker that scores candidates on grounded
  evidence of fit rather than keyword overlap. The JD is encoded as a declarative set of
  requirements (requirements.json); each candidate becomes (requirement, evidence,
  satisfaction) triples. Score = base x trap_penalties x behavioral_modifier. Base is a
  weighted sum of six grounded components (builder identity, retrieval/vector-search skills,
  shipped-systems career evidence, experience band, location, evaluation/pedigree). Skills are
  trust-weighted by endorsements x duration x assessment so unbacked keyword-stuffing doesn't
  count; behavioral signals are a bidirectional multiplier so unavailable candidates are
  down-weighted (per the JD); honeypots are forced near-zero by internal-consistency checks.
  Every component was kept or rejected by an offline eval harness: planted oracle cases, proxy
  NDCG/MAP/P@10 against an independent labeler, and a 60-candidate hand-labeled gold set
  (MAP=1.0). We tested and REJECTED a semantic-embedding stage (hurt NDCG, fragile dependency)
  and extra honeypot checks (false positives) — restraint by evidence. Runtime ~12s for 100K
  on CPU, no network, no GPU; 0 honeypots and 0 keyword-stuffers in the top 100.

